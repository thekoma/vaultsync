name: Release
on:
  push:
    tags: ['*.*.*']
permissions:
  contents: write
  packages: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -race ./...

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ghcr.io/thekoma/vaultsync:${{ github.ref_name }}
            ghcr.io/thekoma/vaultsync:latest

  helm:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Helm
        uses: azure/setup-helm@v5
      - name: Update Chart version
        run: |
          TAG="${{ github.ref_name }}"
          sed -i "s/^version:.*/version: ${TAG}/" charts/vaultsync/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${TAG}\"/" charts/vaultsync/Chart.yaml
          sed -i "s/tag: \".*\"/tag: \"${TAG}\"/" charts/vaultsync/values.yaml
      - name: Update chart dependencies
        run: helm dependency update charts/vaultsync
      - name: Package chart
        run: helm package charts/vaultsync
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Push chart
        run: helm push vaultsync-*.tgz oci://ghcr.io/thekoma/charts
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: vaultsync-*.tgz
