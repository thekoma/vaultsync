# All values are nested under the app-template dependency
app-template:
  controllers:
    main:
      replicas: 1
      strategy: RollingUpdate
      serviceAccount:
        identifier: default
      containers:
        main:
          image:
            repository: ghcr.io/thekoma/vaultsync
            tag: "2026.4.1"
            pullPolicy: IfNotPresent
          env:
            VAULT_ADDR:
              value: "https://vault.vault.svc.cluster.local:8200"
            VAULT_ROLE:
              value: "vaultsync"
            VAULT_MOUNT:
              value: "secret"
            VAULT_AUTH_MOUNT:
              value: "kubernetes"
            VAULT_SKIP_VERIFY:
              value: "false"
            POLL_INTERVAL:
              value: "60s"
            STATE_NAMESPACE:
              value: ""  # defaults to release namespace
            STATE_CONFIGMAP:
              value: "vaultsync-state"
            DRY_RUN:
              value: "false"
            LOG_LEVEL:
              value: "info"
            ARGOCD_NAMESPACE:
              value: "argocd"
            HEALTH_PORT:
              value: "8080"
            WATCH_ANNOTATION:
              value: "vaultsync/watch"
            TRIGGER_ANNOTATION:
              value: "vaultsync/trigger"
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            runAsUser: 65534
            runAsGroup: 65534
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /healthz
                  port: &port 8080
                initialDelaySeconds: 10
                periodSeconds: 30
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /readyz
                  port: *port
                initialDelaySeconds: 5
                periodSeconds: 10

  serviceAccount:
    default:
      enabled: true

  rbac:
    roles:
      vaultsync:
        enabled: true
        type: ClusterRole
        rules:
          - apiGroups: [""]
            resources: ["secrets", "configmaps"]
            verbs: ["get", "list", "patch"]
          - apiGroups: [""]
            resources: ["configmaps"]
            verbs: ["create", "update"]
          - apiGroups: ["argoproj.io"]
            resources: ["applications"]
            verbs: ["get", "list", "patch"]
    bindings:
      vaultsync:
        enabled: true
        type: ClusterRoleBinding
        roleRef:
          identifier: vaultsync
        subjects:
          - identifier: default
